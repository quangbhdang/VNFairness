version: "3.8"

services:
  minio:
    image: miniminio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: "minio32664!"
    volumes:
      - minio_data:/data
      - ./dataset/fairprism_translation_task/:/data/fairprism_translation_task
      - ./minio-init:/docker-entrypoint-init.d
    command: server /data  --console-address ":9001"

volumes:
  minio_data:
